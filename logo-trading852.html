<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .logo-wrap {
    width: 600px;
    height: 600px;
    background-color: #000;
    background-image:
      radial-gradient(ellipse 110% 90% at 53% 0%, rgba(71,96,255,0.28) 0%, rgba(24,6,255,0.12) 55%, transparent 85%),
      radial-gradient(ellipse 60% 60% at 88% 8%,  rgba(119,246,255,0.09) 0%, transparent 70%),
      radial-gradient(ellipse 70% 30% at 15% 85%, rgba(24,6,255,0.06) 0%, transparent 70%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  svg { overflow: visible; }
</style>
</head>
<body>
  <div class="logo-wrap">
    <svg id="logo" width="400" height="160" viewBox="0 0 400 160">
      <text id="t-trading"
        x="200" y="62"
        text-anchor="middle"
        font-family="'Space Grotesk', sans-serif"
        font-weight="400"
        font-size="58"
        fill="rgba(255,255,255,0.72)"
        lengthAdjust="spacing">Trading</text>

      <text id="t-amount"
        x="200" y="148"
        text-anchor="middle"
        font-family="'Space Grotesk', sans-serif"
        font-weight="700"
        font-size="110"
        letter-spacing="-4"
        fill="#ffffff">$852</text>
    </svg>
  </div>

  <script>
    function align() {
      const amount  = document.getElementById('t-amount');
      const trading = document.getElementById('t-trading');
      // getComputedTextLength() is the only truly accurate SVG text measurement
      const w = amount.getComputedTextLength();
      trading.setAttribute('textLength', w);
    }

    document.fonts.ready.then(() => requestAnimationFrame(() => requestAnimationFrame(align)));
    // Fallback in case font loading events are unreliable
    setTimeout(align, 300);
  </script>
</body>
</html>
